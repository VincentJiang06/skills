<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>icon_only refinement fixture: aria-label vs no label</title>
<style>
  body { background-color: #0b0b0b; color: #ffffff; font-size: 16px; }
  .iconbtn { width: 64px; height: 64px; background-color: #ffffff;
             color: #0b0b0b; margin: 12px; border: none; }
</style>
</head>
<body>
  <!-- aria-label but no visible text -> icon_only MINOR (weak under glare) -->
  <button class="iconbtn" aria-label="拍照"><svg viewBox="0 0 24 24"></svg></button>
  <!-- no label at all -> icon_only MAJOR -->
  <button class="iconbtn"><svg viewBox="0 0 24 24"></svg></button>
</body>
</html>
