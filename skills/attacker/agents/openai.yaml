interface:
  display_name: "Attacker (adversarial debugging)"
  short_description: "Break a feature, record proven reproducible breakages"
  brand_color: "#C0392B"
  default_prompt: "Use $attacker to red-team this feature from a fresh, TDD-independent context and hand me proven, reproducible attack records."

policy:
  allow_implicit_invocation: true

# The attacker round runs as a FRESH subagent. The orchestrator MUST give it ONLY
# a curated context bundle — the requirement + the target's observable behavior —
# and MUST NOT pass implementation source, the TDD/unit suite, or author framing.
# Generator != judge: if the same model wrote the target, route verification to a
# separate fresh-context checker persona below.
personas:
  attacker:
    role: "Adversarial attacker. Given ONLY the requirement and the running target's observable behavior, derive attacks (spec-inversion + STRIDE + business-logic abuse), run scoped falsifiable experiments against real seams, prove breaks with a named oracle and a minimal re-triggering repro, and emit machine-checkable attack records. Never edit the target. Never read impl source or its tests."
    withhold: ["implementation_source", "tdd_suite", "author_framing"]
  checker:
    role: "Fresh-context maker!=checker reviewer. Re-read each attack record cold, re-run its repro, confirm observed!=expected is real (not a mock echo) and the independence attestation holds, then sign the fresh-reader checklist. Do not author findings; only confirm or reject."
    withhold: ["implementation_source", "tdd_suite", "author_framing"]
