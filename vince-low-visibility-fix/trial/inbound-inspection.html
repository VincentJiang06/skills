<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入库质检</title>
<style>
  body { margin: 0; background-color: #0b0f14; color: #f2f6fa;
         font-size: 16px; font-family: system-ui, sans-serif; }
  header { background-color: #14406e; color: #ffffff; padding: 16px; }
  .title { font-size: 18px; }
  .meta { color: #e6eef7; font-size: 16px; }
  .hero { background-image: linear-gradient(rgba(7,11,16,.62), rgba(7,11,16,.62)),
                            url("dock-4.jpg");
          background-color: #0b0f14; color: #ffffff; padding: 24px; }
  .hero-title { font-size: 18px; }
  .card { background-color: #14202b; padding: 16px; }
  .qty { color: #f2f6fa; font-size: 16px; }
  .status { background-color: #7a3f00; color: #ffffff; font-size: 16px;
            padding: 4px 10px; border-radius: 6px; }
  .toolbar { display: flex; }
  .icon-btn { min-width: 64px; min-height: 64px; margin: 12px; padding: 10px;
              background-color: #ffffff; color: #14406e; border: none;
              display: inline-flex; flex-direction: column; align-items: center;
              gap: 4px; font-size: 16px; }
  .tabbar { display: flex; }
  .tab { min-width: 64px; min-height: 64px; color: #f2f6fa; font-size: 16px;
         text-decoration: none; display: inline-flex; align-items: center;
         justify-content: center; }
  .primary { background-color: #14406e; color: #ffffff; width: 100%;
             min-height: 64px; border: none; font-size: 18px; }
</style>
</head>
<body>
  <header>
    <div class="title">入库质检 · 批次 PO-20493</div>
    <div class="meta">仓库 B / 月台 4 / 2026-06-01 14:20</div>
  </header>

  <div class="hero">
    <div class="hero-title">月台 4 实拍</div>
  </div>

  <div class="card">
    <div class="qty">应收 120 · 实收 118 <span class="status">缺 2 件</span></div>
    <p>请核对每箱数量，发现破损请拍照并标记。完成后点击下方提交质检结果。</p>
    <div class="toolbar">
      <button class="icon-btn"><svg viewBox="0 0 24 24" aria-hidden="true"></svg><span>拍照</span></button>
      <button class="icon-btn"><svg viewBox="0 0 24 24" aria-hidden="true"></svg><span>破损</span></button>
      <button class="icon-btn"><svg viewBox="0 0 24 24" aria-hidden="true"></svg><span>备注</span></button>
    </div>
  </div>

  <nav class="tabbar">
    <a class="tab" href="#scan">扫码</a>
    <a class="tab" href="#list">列表</a>
    <a class="tab" href="#me">我的</a>
  </nav>

  <button class="primary">提交质检</button>
</body>
</html>
