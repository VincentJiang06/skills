<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>设备点检</title>
<style>
  /* High-contrast, large-target design for outdoor sunlight + gloved operation.
     - Dark near-black background with bright text maximizes legibility in glare.
     - All interactive targets are >= 64px tall for gloved fingertips.
     - Status uses text + shape + color (not color alone). */

  :root {
    --bg: #0a0a0a;          /* near-black, kills sky reflection */
    --surface: #1c1c1c;     /* raised panels */
    --text: #ffffff;        /* max-contrast body text */
    --text-dim: #e6e6e6;    /* still > 12:1 on bg */
    --line: #555555;        /* visible borders in sun */
    --accent: #ffd400;      /* high-luminance focus/affordance */
    --ok: #16c060;          /* status: normal */
    --alarm: #ff3b30;       /* status: fault */
    --save: #ffd400;        /* primary action, bright */
    --save-text: #1a1a00;   /* dark text on bright button = high contrast */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    font-size: 22px;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    padding: max(20px, env(safe-area-inset-top))
             max(20px, env(safe-area-inset-right))
             max(24px, env(safe-area-inset-bottom))
             max(20px, env(safe-area-inset-left));
  }

  h1 {
    font-size: 30px;
    font-weight: 800;
    color: var(--text);
    margin: 4px 0 24px;
    letter-spacing: 0.5px;
  }

  /* ---- Status: text label + colored pill + icon, never color alone ---- */
  .status-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 28px;
  }
  .status-label { color: var(--text-dim); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 24px;
    font-weight: 800;
    border: 3px solid #ffffff;
  }
  .status-pill .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffffff;
    display: inline-block;
    flex: 0 0 auto;
  }
  /* Fault state */
  .status-pill.alarm {
    background-color: var(--alarm);
    color: #ffffff;
    border-color: #ffffff;
  }
  /* Normal state (uncomment class swap in markup as needed) */
  .status-pill.ok {
    background-color: var(--ok);
    color: #06210f;
    border-color: #06210f;
  }
  .status-pill.ok .dot { background: #06210f; }

  /* ---- Action buttons: oversized for gloves, high contrast ---- */
  .toolbar {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .btn {
    background-color: var(--surface);
    color: var(--text);
    min-width: 72px;
    min-height: 72px;
    border: 3px solid var(--line);
    border-radius: 16px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn svg {
    width: 32px;
    height: 32px;
    stroke: var(--text);
    stroke-width: 2.5;
    fill: none;
  }
  .btn .btn-label { font-size: 15px; }
  .btn:active { background-color: #2e2e2e; }

  /* ---- Primary save action: full width, tall, brightest element ---- */
  .save {
    background-color: var(--save);
    color: var(--save-text);
    width: 100%;
    min-height: 76px;
    border: none;
    border-radius: 18px;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .save:active { background-color: #e6bf00; }

  /* Clear keyboard/focus ring for accessibility */
  .btn:focus-visible,
  .save:focus-visible {
    outline: 4px solid var(--accent);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <h1>设备点检 · 锅炉房</h1>

  <div class="status-row">
    <span class="status-label">当前状态</span>
    <span class="status-pill alarm" role="status" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>故障
    </span>
  </div>

  <div class="toolbar">
    <button class="btn" type="button" aria-label="刷新">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 11a8 8 0 1 0-2 6"/>
        <path d="M20 4v6h-6"/>
      </svg>
      <span class="btn-label">刷新</span>
    </button>
  </div>

  <button class="save" type="button">保存点检</button>
</body>
</html>
