<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>设备点检</title>
<style>
  body { background-color: #fafafa; color: #1a1a1a; font-size: 16px; }
  h1 { font-size: 18px; color: #1a1a1a; }
  .btn { background-color: #eeeeee; color: #1a1a1a; min-width: 64px; min-height: 64px;
         padding: 12px; display: inline-flex; align-items: center; gap: 8px; }
  .save { background-color: #0a5c3a; color: #ffffff; width: 90%; min-height: 64px;
          font-size: 18px; padding: 12px; }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 16px;
            font-weight: 700; }
  .status.alarm { color: #a10000; }
</style>
</head>
<body>
  <h1>设备点检 · 锅炉房</h1>
  <p>当前状态 <span class="status alarm"><svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L22 20 H2 Z" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="9" x2="12" y2="14" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>报警</span></p>
  <button class="btn"><svg viewBox="0 0 24 24" aria-hidden="true"></svg><span>刷新</span></button>
  <button class="save">保存点检</button>
</body>
</html>
