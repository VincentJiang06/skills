<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>设备点检</title>
<style>
  body { background-color: #fafafa; color: #888888; font-size: 13px; }
  h1 { font-size: 15px; color: #999999; }
  .btn { background-color: #eeeeee; color: #aaaaaa; width: 40px; height: 40px; }
  .save { background-color: #33aa77; color: #cce8dd; width: 90%; height: 40px; }
  .dot { background-color: #dd3333; width: 12px; height: 12px;
         border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
  <h1>设备点检 · 锅炉房</h1>
  <p>当前状态 <span class="dot"></span></p>
  <button class="btn"><svg viewBox="0 0 24 24"></svg></button>
  <button class="save">保存点检</button>
</body>
</html>
